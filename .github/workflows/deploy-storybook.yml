name: Build and Deploy Storybook

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Validate remote path safety
        env:
          REMOTE_PATH: ${{ secrets.CPANEL_REMOTE_PATH }}
        run: |
          if [ -z "$REMOTE_PATH" ]; then
            echo "CPANEL_REMOTE_PATH is empty."
            exit 1
          fi
          if [ "$REMOTE_PATH" = "/" ]; then
            echo "CPANEL_REMOTE_PATH must not be '/'."
            exit 1
          fi

      - name: Deploy via SSH (rsync)
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avz --delete --exclude='.git*'
          path: './storybook-static'
          remote_path: ${{ secrets.CPANEL_REMOTE_PATH }}/
          remote_host: ${{ secrets.CPANEL_HOST }}
          remote_user: ${{ secrets.CPANEL_USER }}
          remote_key: ${{ secrets.CPANEL_SSH_KEY }}
          remote_port: ${{ secrets.CPANEL_PORT }}
