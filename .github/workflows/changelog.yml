name: Update Changelog

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-on-push:
    if: github.event_name == 'push'
    uses: allcapsjoe/action-jackson/.github/workflows/update-changelog.yml@main
    with:
      event-name: 'push'
      commit-sha: ${{ github.sha }}

  update-on-release:
    if: github.event_name == 'release'
    uses: allcapsjoe/action-jackson/.github/workflows/update-changelog.yml@main
    with:
      event-name: 'release'
      release-tag: ${{ github.event.release.tag_name }}
      release-body: ${{ github.event.release.body }}
      target-branch: ${{ github.event.release.target_commitish }}
      default-branch: ${{ github.event.repository.default_branch }}
